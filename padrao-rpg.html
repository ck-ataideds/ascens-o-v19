function renderExp() {
  const panel = document.getElementById('sectionPanel');
  panel.innerHTML = `<div class="section-wrap amb-exp">
    <div class="section-title" style="--section-color:#a855f7;color:#a855f7;"><i class="fas fa-star"></i><span>EXPERIÊNCIAS · 11 CATEGORIAS</span><div class="title-line"></div></div>
    <div id="catContainer"></div>
  </div>`;
  const cont = document.getElementById('catContainer');
  gameData.categories.forEach((cat, ci) => {
    const catDiv = document.createElement('div'); catDiv.className='cat-card';
    const totalSubs = cat.subs.length;
    const avgLv = cat.subs.reduce((s,sub)=>s+(sub.currentLevel||0),0) / totalSubs;
    catDiv.innerHTML = `<div class="cat-header" id="ch_${ci}">
      <div><span class="cat-icon">${cat.icon}</span><span>${cat.name}</span></div>
      <div style="display:flex;align-items:center;gap:8px;"><span style="font-size:0.65rem;color:var(--text-dim)">${avgLv.toFixed(1)} avg</span><span style="color:var(--gold)">${openCats[ci]?'▼':'▶'}</span></div>
    </div>`;
    const subList = document.createElement('div'); subList.className = `sub-list${openCats[ci]?' open':''}`;
    catDiv.querySelector(`#ch_${ci}`).onclick = () => { playSound('click'); openCats[ci]=!openCats[ci]; renderExp(); };
    cat.subs.forEach((sub, si) => {
      const key = `${ci}_${si}`;
      const pct = Math.min(100, ((sub.expPoints||0)/(sub.maxLevel*10))*100);
      const subBtn = document.createElement('div'); subBtn.className='sub-btn';
      subBtn.innerHTML = `<span><strong>${sub.name}</strong></span><span class="sub-level">${sub.currentLevel||0}/${sub.maxLevel}</span>`;
      const detail = document.createElement('div'); detail.className=`sub-detail${currentSubKey===key?' open':''}`;
      detail.innerHTML = `<div class="sub-prog-bar"><div class="sub-prog-fill" style="width:${pct}%"></div></div>
        <div style="text-align:center;font-size:0.7rem;color:var(--text-dim);margin-bottom:8px;">${sub.expPoints||0}/${sub.maxLevel*10} EXP</div>
        <div id="tasks_${key}"></div>`;
      subBtn.onclick = () => { playSound('click'); currentSubKey = currentSubKey===key?null:key; renderExp(); };
      sub.tasks.forEach(task => {
        const row = document.createElement('div'); row.className = `task-row ${task.difficulty||'media'} ${task.completed?'completed':''}`;
        const diffEmoji = task.difficulty==='facil'?'🟢':task.difficulty==='dificil'?'🔴':'🟡';
        row.innerHTML = `<input type="checkbox" class="toggle-sw" style="transform:scale(0.85)" ${task.completed?'checked disabled':''}><span class="task-label">${diffEmoji} ${task.description}</span><span class="task-reward">+${task.coinReward}🪙</span>`;
        if (!task.completed) {
          const chk = row.querySelector('input');
          const apply = () => {
            if (chk.checked) {
              task.completed = true;
              const taskExp = task.expReward || 10;
              const taskCoins = task.coinReward || 30;
              sub.expPoints = (sub.expPoints||0) + taskExp;
              let maxComp = 0; sub.tasks.forEach(t=>{if(t.completed&&t.levelRequired>maxComp)maxComp=t.levelRequired;});
              sub.currentLevel = Math.min(maxComp, sub.maxLevel);
              addCoins(taskCoins); playSound('task');
              // Map to main stat
              const catMap = {
                // SHAPE: corpo, luta, esportes
                'CORPO/SAÚDE':'SHAPE','LUTA':'SHAPE','ESPORTES':'SHAPE',
                // GIRLS: relacionamento íntimo/romântico APENAS
                'RELACIONAMENTO':'GIRLS',
                // SOCIAL: redes sociais, família (vínculos e presença social)
                'SOCIAL':'SOCIAL','FAMÍLIA':'SOCIAL',
                // SWAG: aparência, habilidades do homem
                'APARÊNCIA':'SWAG','HABILIDADES':'SWAG',
                // MIND: livros, espiritualidade
                'INTELIGÊNCIA':'MIND','ESPIRITUALIDADE':'MIND',
                // CASH: dinheiro, bens
                'DINHEIRO':'CASH'
              };
              const mStat = catMap[cat.name];
              if (mStat) addExp(mStat, taskExp);
              showAchievement('🏅 '+task.description, `+${taskCoins} coins · +${taskExp} EXP`);
              saveGameData(); renderExp();
            }
          };
          chk.onchange = apply;
          row.onclick = (e) => { if(e.target!==chk){ chk.checked=!chk.checked; apply(); } };
        }
        detail.querySelector(`#tasks_${key}`).appendChild(row);
      });
      subList.appendChild(subBtn); subList.appendChild(detail);
    });
    catDiv.appendChild(subList); cont.appendChild(catDiv);
  });
}

        <div class="stat-item"><span>KakáCoins Ganhas</span><span class="stat-val">${totalCoinsEarned}</span></div>
        <div class="stat-item"><span>KakáCoins Atual</span><span class="stat-val">${kakaCoins}</span></div>
        <div class="stat-item"><span>Bônus SWAG Itens</span><span class="stat-val">+${swagBonus()}</span></div>

    type: 'radar',
    data: { labels:['SHAPE','GIRLS','SWAG','MIND','SOCIAL','CASH'], datasets:[{
      label:'', data:['SHAPE','GIRLS','SWAG','MIND','SOCIAL','CASH'].map(s=>getProgress(s).lv*10),
      backgroundColor:'rgba(255,183,71,0.15)', borderColor:'#FFB347', borderWidth:2,
      pointBackgroundColor:'#FFD700', pointRadius:4
    }]},
    options:{ responsive:true, maintainAspectRatio:true, scales:{r:{beginAtZero:true,max:100,ticks:{color:'#666',stepSize:20},grid:{color:'rgba(255,255,255,0.05)'},angleLines:{color:'rgba(255,255,255,0.05)'}}}, plugins:{legend:{display:false}}, elements:{line:{tension:0.2}} }
  });
}

    <div class="swag-layout">
      <div class="swag-sidebar">
        ${cats.map(cat=>`<div class="swag-cat-item ${currentSwagCat===cat?'active':''}" data-cat="${cat}"><i class="${swagItems[cat].icon}"></i><span>${cat}</span></div>`).join('')}
      </div>
      <div class="swag-content"><div class="swag-grid" id="swagGrid"></div></div>
    </div>
  </div>`;
  panel.querySelectorAll('.swag-cat-item').forEach(el => {
    el.onclick = () => { playSound('click'); currentSwagCat = el.dataset.cat; renderSwag(); };
  });
  const grid = document.getElementById('swagGrid');
  const items = [...swagItems[currentSwagCat].items].sort((a,b)=>a.price-b.price);
  items.forEach(item => {
    const owned = swagInventory.owned.includes(item.id);
    const card = document.createElement('div'); card.className=`swag-card${owned?' owned':''}`;
    card.innerHTML = `<div class="swag-name">${item.name}</div>
      <div class="swag-price">💰 ${item.price} coins</div>
      <div class="swag-bonus">✨ +${item.bonus}% SWAG</div>
      ${!owned ? `<button class="swag-buy" data-id="${item.id}" data-price="${item.price}">COMPRAR</button>` : `<span class="swag-owned-tag">✅ ADQUIRIDO</span>`}`;
    if (!owned) {
      card.querySelector('.swag-buy').onclick = () => {
        if (kakaCoins >= item.price) {
          confirmModal(`Comprar ${item.name} por ${item.price} coins?`, () => {
            spendCoins(item.price); swagInventory.owned.push(item.id); saveSwag();
            playSound('buy'); renderSwag(); refreshStatsUI();
          });
        } else showToast('❌ Coins insuficientes', `Faltam ${item.price-kakaCoins} coins`, 'error');
      };
    }
    grid.appendChild(card);
  });
}

// ======================== FRIENDS ===================================
// ===================================================================
function renderFriends() {
  const panel = document.getElementById('sectionPanel');
  panel.innerHTML = `<div class="section-wrap amb-friends">
    <div class="section-title" style="--section-color:#f43f5e;color:#f43f5e;"><i class="fas fa-users"></i><span>AMIGOS · PERFIS</span><div class="title-line"></div></div>
    <div class="friends-grid" id="friendsGrid"></div>
  </div>`;
  const grid = document.getElementById('friendsGrid');

  // Sort by overall
  const sorted = [...friends].sort((a,b) => {
    const avgA = Object.values(a.stats).reduce((s,v)=>s+v,0)/5;
    const avgB = Object.values(b.stats).reduce((s,v)=>s+v,0)/5;
    return avgB - avgA;
  });

  sorted.forEach(friend => {
    const overall = (Object.values(friend.stats).reduce((s,v)=>s+v,0)/5).toFixed(1);
    const statColors3 = {SHAPE:'#ef4444',GIRLS:'#ec4899',SWAG:'#a855f7',MIND:'#3b82f6',SOCIAL:'#06b6d4',CASH:'#f59e0b'};
    const card = document.createElement('div'); card.className='friend-card';
    card.innerHTML = `
      <div class="friend-avatar">${friend.photo ? `<img src="${friend.photo}">` : `<span>${friend.emoji||'👤'}</span>`}</div>
      <div class="friend-name">${friend.name}</div>
      <div class="friend-title">${friend.title}</div>
      <div class="friend-stats">
        ${Object.entries(friend.stats).map(([stat,val])=>`
          <div class="friend-stat-row">
            <span class="friend-stat-name" style="color:${statColors3[stat]}">${statEmoji[stat]} ${stat}</span>
            <div class="friend-stat-bar"><div class="friend-stat-fill" style="width:${val}%;background:${statColors3[stat]}66;"></div></div>
            <span class="friend-stat-val" style="color:${statColors3[stat]}">${val}</span>
          </div>`).join('')}
      </div>
      <div class="friend-overall">OVERALL: ${overall}</div>
      <button class="swag-buy" style="margin-top:10px;" onclick="editFriend('${friend.id}')">✏️ EDITAR</button>
      <button class="swag-buy" style="margin-top:6px;border-color:#f43f5e;color:#f43f5e;" onclick="deleteFriend('${friend.id}')">🗑️ REMOVER</button>`;
    grid.appendChild(card);
  });

  // Add friend card
  const addCard = document.createElement('div'); addCard.className='add-friend-card';
  addCard.innerHTML = `<i class="fas fa-user-plus"></i><span>ADICIONAR AMIGO</span>`;
  addCard.onclick = () => addFriendModal();
  grid.appendChild(addCard);
}

function addFriendModal(existing) {
  const f = existing || { name:'', title:'', emoji:'👤', stats:{SHAPE:50,GIRLS:50,SWAG:50,MIND:50,SOCIAL:50,CASH:50} };
  const ov = openModal(`
    <div class="modal-title">${existing?'EDITAR':'NOVO'} AMIGO</div>
    <input class="modal-input" id="fName" placeholder="Nome" value="${f.name}">
    <input class="modal-input" id="fTitle" placeholder="Título (ex: O Atleta)" value="${f.title}">
    <input class="modal-input" id="fEmoji" placeholder="Emoji (ex: 🔥)" value="${f.emoji||'👤'}">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
      ${Object.entries(f.stats).map(([stat,val])=>`
        <div><label style="font-size:0.7rem;color:var(--text-dim);">${statEmoji[stat]} ${stat}</label>
        <input type="number" class="modal-input fstat" data-stat="${stat}" value="${val}" min="0" max="100" style="margin-bottom:4px;"></div>`).join('')}
    </div>
    <div class="modal-btns">
      <button class="modal-btn confirm" id="fSave">SALVAR</button>
      <button class="modal-btn cancel" id="fCancel">CANCELAR</button>
    </div>`);
  ov.querySelector('#fSave').onclick = () => {
    const name = ov.querySelector('#fName').value.trim();
    if (!name) { showToast('❌ Erro', 'Coloque um nome', 'error'); return; }
    const stats = {};
    ov.querySelectorAll('.fstat').forEach(inp => { stats[inp.dataset.stat] = Math.min(100,Math.max(0,parseInt(inp.value)||0)); });
    const newFriend = { id: existing?.id || Date.now().toString(), name, title: ov.querySelector('#fTitle').value.trim()||'Amigo', emoji: ov.querySelector('#fEmoji').value.trim()||'👤', stats };
    if (existing) { const idx = friends.findIndex(f=>f.id===existing.id); if(idx>=0) friends[idx]=newFriend; }
    else friends.push(newFriend);
    saveFriends(); ov.remove(); playSound('coin'); renderFriends();
  };
  ov.querySelector('#fCancel').onclick = () => ov.remove();
}
function editFriend(id) { const f = friends.find(fr=>fr.id===id); if(f) addFriendModal(f); }
function deleteFriend(id) { confirmModal('Remover este amigo?', () => { friends = friends.filter(f=>f.id!==id); saveFriends(); renderFriends(); }); }

// ===================================================================
// ======================== THEMES ====================================
// ===================================================================
function applyTheme(theme) {
  // Remove all theme classes first
  document.body.classList.remove('theme-default','theme-dark','theme-nature','theme-fire','theme-cyber','theme-solo','theme-douchebag');
  // Reset inline background
  document.body.style.background = '';

  if (theme === 'solo' || theme === 'douchebag') {
    document.body.classList.add(`theme-${theme}`);
  } else {
    const bgs = {
      default: 'radial-gradient(ellipse at 15% 25%, #0d0520 0%, #020408 50%, #000204 100%)',
      dark:    '#0a0a0a',
      nature:  'linear-gradient(135deg, #1a3c2c, #0a1f14)',
      fire:    'radial-gradient(ellipse at 20% 80%, #1a0500 0%, #0a0200 50%, #000000 100%)',
      cyber:   'radial-gradient(ellipse at 20% 20%, #001122 0%, #000a14 50%, #000408 100%)',
    };
    document.body.style.background = bgs[theme] || bgs.default;
  }
  localStorage.setItem('appTheme', theme);
}
function loadTheme() {
  const t = localStorage.getItem('appTheme') || 'default';
  applyTheme(t);
  // Sync select if options screen is open
  const sel = document.getElementById('optTheme');
  if (sel) sel.value = t;
}

document.getElementById('avatarFileInput').onchange = (e) => {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    avatarDataURL = ev.target.result; saveAvatar();
    // Update avatar frame if visible
    const frame = document.getElementById('avatarFrame');
    if (frame) { frame.innerHTML = `<img src="${avatarDataURL}" alt="avatar">`; }
    showToast('📸 Avatar atualizado!', 'Foto salva com sucesso', 'success');
  };
  reader.readAsDataURL(file);
};

// ===== LOG SLIDE PANEL =====
function openLogPanel() {
  const panel = document.getElementById('logSlidePanel');
  panel.classList.add('open');
  renderLogPanel();
}
function closeLogPanel() {
  document.getElementById('logSlidePanel').classList.remove('open');
}
function renderLogPanel() {
  const entries = document.getElementById('logEntriesSlide');
  if (!entries) return;
  if (conquestLog.length === 0) {
    entries.innerHTML = '<div style="color:var(--text-dim);font-size:0.8rem;text-align:center;padding:30px 10px;">Nenhuma conquista ainda.<br><br>Complete tarefas para registrar seu progresso aqui.</div>';
    return;
  }
  entries.innerHTML = conquestLog.map(entry => `
    <div class="log-entry">
      <div class="log-dot" style="background:${entry.color};box-shadow:0 0 6px ${entry.color};"></div>
      <div class="log-date">${entry.date}</div>
      <div class="log-text">${entry.text}</div>
    </div>`).join('');
}

document.getElementById('logsOpenBtn').onclick = () => openLogPanel();
document.getElementById('logCloseBtn').onclick = () => closeLogPanel();
document.getElementById('clearLogBtnSlide').onclick = () => confirmModal('Limpar todo o diário?', () => { conquestLog=[]; saveLog(); renderLogPanel(); });

// Close log panel on outside click
document.addEventListener('click', (e) => {
  const panel = document.getElementById('logSlidePanel');
  const btn = document.getElementById('logsOpenBtn');
  if (panel && panel.classList.contains('open') && !panel.contains(e.target) && e.target !== btn) {
    closeLogPanel();
  }
});

// ===================================================================
// ======================== INIT ======================================
// ===================================================================
function init() {
  loadGameData(); loadCoins(); loadExp(); initRoutine();
  loadSwag(); loadAvatar(); loadFriends(); loadAgenda();
  loadLog(); loadMissions(); loadDungeon(); loadLastActive();
  loadTheme();
  setScreen('menu');
  refreshStatsUI();
  saveLastActive();
  // Schedule notifications on load if permitted
  if (notifPermission === 'granted') scheduleAgendaNotifications();
  // Check penalty after a tiny delay so screens load first
  setTimeout(() => checkPenalty(), 1500);
}
init();
</script>
