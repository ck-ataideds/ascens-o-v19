<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CAETANO RPG">
<meta name="theme-color" content="#020408">
<title>CAETANO · ASCENSÃO V19</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --gold:#FFD700; --gold2:#FFB347; --gold-dim:rgba(255,215,0,0.15);
  --bg-deep:#020408; --bg-mid:#080d18; --bg-card:rgba(8,13,28,0.9);
  --border:rgba(255,215,0,0.25); --border-bright:rgba(255,215,0,0.7);
  --text:#e8e0f0; --text-dim:#8880a0;
  --accent-routine:#3b82f6; --accent-exp:#a855f7; --accent-stats:#22c55e;
  --accent-swag:#eab308; --accent-friends:#f43f5e; --accent-agenda:#06b6d4;
  --font-head:'Orbitron',monospace; --font-body:'Rajdhani',sans-serif;
  --transition:0.35s cubic-bezier(0.4,0,0.2,1);
}

body {
  background: radial-gradient(ellipse at 15% 25%, #0d0520 0%, #020408 50%, #000204 100%);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
  color: var(--text);
  cursor: default;
}

/* ===== STARS BG ===== */
.stars-layer {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    radial-gradient(1px 1px at 20% 30%, rgba(255,215,0,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 10%, rgba(200,180,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 70%, rgba(255,215,0,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 10% 90%, rgba(180,200,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 50%, rgba(255,200,100,0.3) 0%, transparent 100%);
  background-size: 300px 300px, 250px 250px, 400px 400px, 200px 200px, 350px 350px;
  animation: driftStars 120s linear infinite;
}
@keyframes driftStars { to { background-position: 300px 300px, -250px 250px, 400px -400px, -200px 200px, 350px 350px; } }

/* Scan lines overlay */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:1;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
}

/* ===== SCREEN WRAPPER ===== */
#appContainer {
  position: relative; z-index: 10;
  max-width: 1440px; margin: 0 auto;
  min-height: 100vh;
  display: flex; flex-direction: column;
}

/* ===== LOADING ===== */
#loadingOverlay {
  position: fixed; inset: 0; z-index: 9999;
  background: #000;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
  font-family: var(--font-head);
}
.loader-ring {
  width: 80px; height: 80px;
  border: 3px solid rgba(255,215,0,0.1);
  border-top-color: var(--gold);
  border-right-color: var(--gold2);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { color: var(--gold); font-size: 0.75rem; letter-spacing: 6px; animation: pulse 1.5s ease infinite; }
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

/* ===== MAIN MENU ===== */
#mainMenuScreen {
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 40px; padding: 40px 20px;
  position: relative;
}
.menu-glitch {
  font-family: var(--font-head);
  font-size: clamp(2rem, 6vw, 5rem);
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 30px rgba(255,215,0,0.5), 0 0 60px rgba(255,215,0,0.2);
  letter-spacing: 4px;
  animation: glitchPulse 3s ease infinite;
  text-align: center;
}
@keyframes glitchPulse {
  0%,90%,100%{ text-shadow: 0 0 30px rgba(255,215,0,0.5); }
  92%{ text-shadow: 4px 0 0 rgba(255,0,100,0.8), -4px 0 0 rgba(0,200,255,0.8), 0 0 30px rgba(255,215,0,0.5); }
  94%{ text-shadow: -2px 0 0 rgba(255,0,100,0.8), 2px 0 0 rgba(0,200,255,0.8), 0 0 30px rgba(255,215,0,0.5); }
}
.menu-subtitle { color: var(--text-dim); font-size: 0.85rem; letter-spacing: 8px; text-transform: uppercase; }

.menu-nav { display: flex; flex-direction: column; gap: 12px; width: 320px; }
.menu-btn-rpg {
  position: relative; overflow: hidden;
  background: transparent;
  border: 1px solid var(--border-bright);
  color: var(--gold);
  font-family: var(--font-head);
  font-size: 0.85rem;
  font-weight: 700;
  padding: 16px 32px;
  letter-spacing: 4px;
  cursor: pointer;
  transition: var(--transition);
  clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
}
.menu-btn-rpg::before {
  content:''; position:absolute; inset:0;
  background: linear-gradient(90deg, transparent, rgba(255,215,0,0.08), transparent);
  transform: translateX(-100%);
  transition: transform 0.5s;
}
.menu-btn-rpg:hover::before { transform: translateX(100%); }
.menu-btn-rpg:hover {
  background: rgba(255,215,0,0.08);
  box-shadow: 0 0 20px rgba(255,215,0,0.3), inset 0 0 20px rgba(255,215,0,0.05);
  transform: translateY(-2px);
}
.menu-btn-rpg:active { transform: scale(0.98); }
.menu-btn-rpg i { margin-right: 12px; }

.menu-version { color: var(--text-dim); font-size: 0.65rem; letter-spacing: 3px; }

/* ===== GAME HEADER ===== */
.game-header {
  position: sticky; top: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
  background: rgba(2,4,8,0.95);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
}
.hero-info { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.hero-name {
  font-family: var(--font-head);
  font-size: 1.1rem;
  font-weight: 900;
  color: var(--gold);
  cursor: pointer;
  transition: var(--transition);
  text-shadow: 0 0 10px rgba(255,215,0,0.4);
}
.hero-name:hover { text-shadow: 0 0 20px rgba(255,215,0,0.8); }
.badge {
  background: rgba(255,215,0,0.08);
  border: 1px solid var(--border);
  color: var(--gold2);
  font-size: 0.7rem;
  font-family: var(--font-head);
  padding: 4px 12px;
  letter-spacing: 1px;
  clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
}
.coins-badge {
  background: linear-gradient(135deg, rgba(255,180,70,0.15), rgba(255,215,0,0.05));
  border: 1px solid var(--gold2);
  color: var(--gold2);
  font-family: var(--font-head);
  font-size: 0.75rem;
  padding: 5px 14px;
  display: flex; align-items: center; gap: 6px;
  clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  transition: var(--transition);
}
.coins-badge.pop { animation: coinPop 0.3s ease; }
@keyframes coinPop { 50%{ transform:scale(1.2); color:#fff; } }

.header-actions { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  background: rgba(255,215,0,0.05);
  border: 1px solid var(--border);
  color: var(--gold2);
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: var(--transition);
  font-size: 0.85rem;
  text-decoration: none;
}
.icon-btn:hover { background: var(--gold); color: #000; transform: scale(1.1) rotate(5deg); }
.back-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font-head);
  font-size: 0.65rem;
  letter-spacing: 2px;
  padding: 6px 16px;
  cursor: pointer;
  transition: var(--transition);
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
.back-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.05); }

/* Notif agenda */
.agenda-notif-btn {
  position: relative;
  background: rgba(6,182,212,0.1);
  border: 1px solid rgba(6,182,212,0.4);
  color: #06b6d4;
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: var(--transition);
  animation: bellShake 4s ease infinite;
}
@keyframes bellShake {
  0%,90%,100%{ transform:rotate(0); }
  92%{ transform:rotate(-15deg); }
  94%{ transform:rotate(15deg); }
  96%{ transform:rotate(-10deg); }
  98%{ transform:rotate(10deg); }
}
.agenda-notif-btn:hover { background: rgba(6,182,212,0.25); }
.notif-dot {
  position: absolute; top: -2px; right: -2px;
  width: 10px; height: 10px;
  background: #f43f5e;
  border-radius: 50%;
  border: 2px solid var(--bg-deep);
  animation: notifPulse 1.5s ease infinite;
}
@keyframes notifPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }

/* Agenda dropdown */
.agenda-dropdown {
  position: absolute; top: 60px; right: 20px;
  width: 320px;
  background: rgba(2,4,8,0.98);
  border: 1px solid rgba(6,182,212,0.4);
  border-radius: 12px;
  padding: 16px;
  z-index: 200;
  display: none;
  box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 20px rgba(6,182,212,0.1);
  animation: slideDown 0.25s ease;
}
@keyframes slideDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
.agenda-dropdown.open { display: block; }
.agenda-dropdown h4 { color: #06b6d4; font-family: var(--font-head); font-size: 0.75rem; letter-spacing: 3px; margin-bottom: 12px; }
.agenda-event {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 8px; margin-bottom: 6px;
  background: rgba(6,182,212,0.05);
  border: 1px solid rgba(6,182,212,0.15);
  border-radius: 8px;
  cursor: pointer;
  transition: var(--transition);
}
.agenda-event:hover { background: rgba(6,182,212,0.1); }
.agenda-event-time { color: #06b6d4; font-family: var(--font-head); font-size: 0.65rem; min-width: 48px; }
.agenda-event-name { color: var(--text); font-size: 0.8rem; }
.agenda-add-btn {
  width: 100%; margin-top: 10px; padding: 8px;
  background: rgba(6,182,212,0.1);
  border: 1px dashed rgba(6,182,212,0.4);
  color: #06b6d4; font-size: 0.75rem;
  border-radius: 8px; cursor: pointer;
  transition: var(--transition);
  font-family: var(--font-head); letter-spacing: 2px;
}
.agenda-add-btn:hover { background: rgba(6,182,212,0.2); }

/* ===== PANELS ===== */
.panel { display: none; min-height: calc(100vh - 60px); padding: 20px; }
.panel.active { display: block; animation: panelIn 0.4s var(--transition); }
@keyframes panelIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

/* ===== HUB ===== */
.hub-hero {
  display: grid; grid-template-columns: 260px 1fr; gap: 20px;
  margin-bottom: 24px; align-items: start;
}
.avatar-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.avatar-card::before {
  content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%;
  background: conic-gradient(transparent 0deg, rgba(255,215,0,0.05) 90deg, transparent 180deg);
  animation: rotateBg 8s linear infinite;
}
@keyframes rotateBg { to { transform: rotate(360deg); } }
.avatar-frame {
  width: 160px; height: 160px;
  border-radius: 50%;
  border: 3px solid var(--gold);
  box-shadow: 0 0 0 6px rgba(255,215,0,0.08), 0 0 30px rgba(255,215,0,0.2);
  margin: 0 auto 14px;
  overflow: hidden;
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: center;
  background: #0a0d1a;
  cursor: pointer;
  transition: var(--transition);
}
.avatar-frame:hover { box-shadow: 0 0 0 6px rgba(255,215,0,0.15), 0 0 50px rgba(255,215,0,0.4); }
.avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
.avatar-frame canvas { width: 100%; height: 100%; }
.avatar-upload-hint { font-size: 0.65rem; color: var(--text-dim); margin-top: 8px; position: relative; z-index: 1; }
.avatar-rank {
  font-family: var(--font-head); font-size: 0.7rem; color: var(--gold2);
  letter-spacing: 2px; margin-bottom: 6px; position: relative; z-index: 1;
}
.avatar-level-bar { height: 3px; background: rgba(255,215,0,0.1); border-radius: 2px; overflow: hidden; margin-top: 8px; position: relative; z-index: 1; }
.avatar-level-fill { height: 100%; background: linear-gradient(90deg, var(--gold2), var(--gold)); transition: width 0.8s ease; }

.stats-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
}
.stat-row { margin-bottom: 14px; }
.stat-row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.stat-row-name { font-family: var(--font-head); font-size: 0.7rem; letter-spacing: 2px; }
.stat-row-val { font-size: 0.65rem; color: var(--text-dim); }
.stat-track { height: 6px; background: rgba(255,255,255,0.04); border-radius: 3px; overflow: visible; position: relative; }
.stat-fill {
  height: 100%; border-radius: 3px;
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  position: relative;
}
.stat-fill::after {
  content:''; position:absolute; right:-1px; top:-3px;
  width: 12px; height: 12px;
  background: inherit;
  border-radius: 50%;
  box-shadow: 0 0 8px currentColor;
  filter: brightness(1.5);
}

.hub-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
}
.hub-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px 16px;
  text-align: center;
  cursor: pointer;
  transition: var(--transition);
  position: relative; overflow: hidden;
}
.hub-card::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, var(--card-accent,var(--gold)), transparent);
  transform: scaleX(0);
  transition: transform 0.4s ease;
}
.hub-card:hover::after { transform: scaleX(1); }
.hub-card:hover {
  transform: translateY(-6px);
  border-color: var(--card-accent, var(--gold));
  box-shadow: 0 12px 30px rgba(0,0,0,0.5), 0 0 20px rgba(var(--card-accent-rgb,255,215,0),0.15);
}
.hub-card i { font-size: 2rem; margin-bottom: 10px; display: block; transition: var(--transition); }
.hub-card:hover i { transform: scale(1.15) rotate(-5deg); }
.hub-card h3 { font-family: var(--font-head); font-size: 0.75rem; letter-spacing: 2px; margin-bottom: 5px; }
.hub-card p { font-size: 0.7rem; color: var(--text-dim); }

/* ===== SECTION CONTAINER ===== */
.section-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  min-height: 500px;
  animation: panelIn 0.4s ease;
}
.section-title {
  font-family: var(--font-head);
  font-size: 0.85rem;
  letter-spacing: 4px;
  margin-bottom: 20px;
  display: flex; align-items: center; gap: 10px;
}
.section-title .title-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--section-color, var(--gold)), transparent);
}

/* ===== TABS ===== */
.tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.tab {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font-head);
  font-size: 0.65rem;
  letter-spacing: 2px;
  padding: 8px 18px;
  cursor: pointer;
  transition: var(--transition);
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
.tab.active { background: var(--section-color, var(--gold)); color: #000; border-color: transparent; }
.tab:hover:not(.active) { border-color: var(--section-color, var(--gold)); color: var(--gold); }

/* ===== ROUTINE ITEMS ===== */
.routine-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; margin-bottom: 8px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 8px;
  transition: var(--transition);
  cursor: pointer;
}
.routine-item:hover { background: rgba(255,255,255,0.04); border-color: var(--border); transform: translateX(4px); }
.routine-item.done { opacity: 0.5; }
.routine-item.done .routine-text { text-decoration: line-through; }
.routine-time { font-family: var(--font-head); font-size: 0.6rem; color: var(--gold2); min-width: 90px; }
.routine-text { flex: 1; font-size: 0.82rem; }
.routine-rewards { display: flex; gap: 6px; font-size: 0.65rem; }
.routine-exp { color: #a855f7; }
.routine-coin { color: var(--gold2); }

/* Toggle switch */
.toggle-sw {
  appearance: none; width: 44px; height: 22px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 22px;
  cursor: pointer; position: relative;
  transition: var(--transition);
  flex-shrink: 0;
}
.toggle-sw::before {
  content:''; position:absolute; width: 16px; height: 16px;
  background: var(--text-dim); border-radius: 50%;
  top: 2px; left: 2px;
  transition: transform 0.3s ease, background 0.3s;
}
.toggle-sw:checked { background: rgba(34,197,94,0.2); border-color: #22c55e; }
.toggle-sw:checked::before { transform: translateX(22px); background: #22c55e; box-shadow: 0 0 8px #22c55e; }
.toggle-sw:disabled { opacity: 0.4; cursor: default; }

/* Progress bar routine */
.routine-progress {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 16px;
  display: flex; justify-content: space-between; align-items: center;
}
.routine-progress-bar { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; flex: 1; margin: 0 12px; }
.routine-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-routine), var(--gold)); transition: width 0.5s ease; }

/* Extra activity */
.extra-panel { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px; }
.extra-btn {
  width: 100%; padding: 10px;
  background: transparent;
  border: 1px dashed var(--border-bright);
  color: var(--gold2);
  font-family: var(--font-head); font-size: 0.65rem; letter-spacing: 3px;
  cursor: pointer; border-radius: 6px;
  transition: var(--transition);
}
.extra-btn:hover { background: rgba(255,215,0,0.05); }
.extra-list { display: none; margin-top: 10px; }
.extra-list.open { display: block; }
.extra-search {
  width: 100%; padding: 8px 12px; margin-bottom: 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text); font-size: 0.8rem;
}
.extra-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; margin-bottom: 4px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 6px;
  cursor: pointer; transition: var(--transition);
  font-size: 0.8rem;
}
.extra-item:hover { background: rgba(255,215,0,0.05); border-color: var(--border); transform: translateX(4px); }

/* ===== EXPERIENCIAS ===== */
.cat-card { margin-bottom: 10px; }
.cat-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px;
  background: rgba(168,85,247,0.08);
  border: 1px solid rgba(168,85,247,0.2);
  border-radius: 8px;
  cursor: pointer; transition: var(--transition);
  font-family: var(--font-head); font-size: 0.7rem; letter-spacing: 2px;
}
.cat-header:hover { background: rgba(168,85,247,0.15); border-color: rgba(168,85,247,0.4); }
.cat-icon { font-size: 1.2rem; margin-right: 8px; }
.sub-list { display: none; padding: 10px 0 4px 12px; }
.sub-list.open { display: block; }
.sub-btn {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px; margin-bottom: 6px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 6px;
  cursor: pointer; transition: var(--transition);
  font-size: 0.82rem;
}
.sub-btn:hover { background: rgba(168,85,247,0.05); border-color: rgba(168,85,247,0.2); }
.sub-level { background: var(--gold); color: #000; font-family: var(--font-head); font-size: 0.6rem; padding: 3px 10px; border-radius: 20px; }
.sub-detail { display: none; padding: 12px; margin-bottom: 6px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(255,255,255,0.04); }
.sub-detail.open { display: block; }
.sub-prog-bar { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
.sub-prog-fill { height: 100%; background: linear-gradient(90deg, #a855f7, var(--gold)); transition: width 0.5s ease; }
.task-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px; margin-bottom: 4px;
  border-radius: 6px; cursor: pointer;
  transition: var(--transition);
  border-left: 3px solid;
  font-size: 0.78rem;
}
.task-row.facil { border-color: #22c55e; background: rgba(34,197,94,0.03); }
.task-row.media { border-color: #eab308; background: rgba(234,179,8,0.03); }
.task-row.dificil { border-color: #f43f5e; background: rgba(244,63,94,0.03); }
.task-row:hover { transform: translateX(4px); }
.task-row.completed { opacity: 0.4; }
.task-row.completed .task-label { text-decoration: line-through; }
.task-label { flex: 1; color: var(--text); }
.task-reward { color: var(--gold2); font-size: 0.65rem; }

/* ===== STATS ===== */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
.stat-card {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 18px;
  transition: var(--transition);
}
.stat-card:hover { border-color: rgba(34,197,94,0.4); transform: translateY(-3px); }
.stat-card h3 { font-family: var(--font-head); font-size: 0.7rem; letter-spacing: 3px; color: var(--accent-stats); margin-bottom: 14px; }
.stat-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.82rem; }
.stat-val { color: var(--gold2); font-family: var(--font-head); font-size: 0.75rem; }

/* ===== SWAG ===== */
.swag-layout { display: flex; gap: 16px; flex-wrap: wrap; }
.swag-sidebar { flex: 0 0 200px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
.swag-cat-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; margin-bottom: 4px;
  border-radius: 8px; cursor: pointer;
  transition: var(--transition);
  font-size: 0.8rem; color: var(--text-dim);
}
.swag-cat-item:hover { background: rgba(255,215,0,0.05); color: var(--text); }
.swag-cat-item.active { background: rgba(234,179,8,0.1); color: var(--gold); border-left: 2px solid var(--gold); }
.swag-cat-item i { width: 20px; text-align: center; }
.swag-content { flex: 1; }
.swag-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.swag-card {
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px; padding: 14px;
  text-align: center; transition: var(--transition);
}
.swag-card:hover { transform: translateY(-4px); border-color: var(--gold); }
.swag-card.owned { border-color: #22c55e; background: rgba(34,197,94,0.04); }
.swag-name { font-family: var(--font-head); font-size: 0.65rem; letter-spacing: 1px; color: var(--gold); margin-bottom: 8px; }
.swag-price { color: var(--gold2); font-size: 0.8rem; }
.swag-bonus { color: #a855f7; font-size: 0.72rem; margin: 4px 0; }
.swag-buy {
  width: 100%; margin-top: 8px; padding: 7px;
  background: rgba(255,215,0,0.08);
  border: 1px solid var(--gold2);
  color: var(--gold);
  font-family: var(--font-head); font-size: 0.6rem; letter-spacing: 2px;
  cursor: pointer; border-radius: 4px;
  transition: var(--transition);
}
.swag-buy:hover { background: var(--gold); color: #000; }
.swag-owned-tag { font-size: 0.65rem; color: #22c55e; margin-top: 8px; display: block; }

/* ===== FRIENDS ===== */
.friends-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.friend-card {
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(244,63,94,0.2);
  border-radius: 14px; padding: 20px;
  transition: var(--transition);
  cursor: pointer;
  position: relative; overflow: hidden;
}
.friend-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, #f43f5e, transparent);
}
.friend-card:hover { transform: translateY(-5px); border-color: rgba(244,63,94,0.5); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.friend-avatar {
  width: 70px; height: 70px;
  border-radius: 50%; border: 2px solid #f43f5e;
  margin: 0 auto 12px;
  overflow: hidden; display: flex; align-items: center; justify-content: center;
  background: #0a0d1a; font-size: 2rem;
}
.friend-avatar img { width: 100%; height: 100%; object-fit: cover; }
.friend-name { font-family: var(--font-head); font-size: 0.8rem; letter-spacing: 2px; color: var(--gold); text-align: center; margin-bottom: 4px; }
.friend-title { font-size: 0.7rem; color: var(--text-dim); text-align: center; margin-bottom: 14px; }
.friend-stats { display: flex; flex-direction: column; gap: 6px; }
.friend-stat-row { display: flex; align-items: center; gap: 8px; font-size: 0.72rem; }
.friend-stat-name { width: 50px; color: var(--text-dim); font-family: var(--font-head); font-size: 0.6rem; }
.friend-stat-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
.friend-stat-fill { height: 100%; border-radius: 2px; }
.friend-stat-val { font-family: var(--font-head); font-size: 0.65rem; width: 30px; text-align: right; }
.friend-overall { text-align: center; margin-top: 12px; font-family: var(--font-head); font-size: 0.65rem; color: var(--gold2); }
.add-friend-card {
  background: rgba(244,63,94,0.04);
  border: 1px dashed rgba(244,63,94,0.3);
  border-radius: 14px; padding: 20px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; cursor: pointer; transition: var(--transition);
  min-height: 200px;
}
.add-friend-card:hover { background: rgba(244,63,94,0.08); border-color: rgba(244,63,94,0.6); }
.add-friend-card i { font-size: 2rem; color: #f43f5e; }
.add-friend-card span { font-family: var(--font-head); font-size: 0.65rem; letter-spacing: 3px; color: #f43f5e; }

/* ===== OPTIONS ===== */
.options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
.options-card {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 20px;
}
.options-card h3 { font-family: var(--font-head); font-size: 0.7rem; letter-spacing: 3px; color: var(--gold2); margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
.option-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 0.8rem;
}
.option-row label { color: var(--text-dim); display: flex; align-items: center; gap: 8px; }
.option-row label i { color: var(--gold2); width: 16px; }
.opt-select {
  background: rgba(255,215,0,0.06);
  border: 1px solid var(--border);
  color: var(--gold);
  font-family: var(--font-head); font-size: 0.65rem;
  padding: 5px 10px; border-radius: 4px; cursor: pointer;
}
.opt-btn {
  background: rgba(255,215,0,0.06);
  border: 1px solid var(--border);
  color: var(--gold2);
  font-family: var(--font-head); font-size: 0.6rem;
  letter-spacing: 2px; padding: 6px 14px;
  cursor: pointer; border-radius: 4px;
  transition: var(--transition);
}
.opt-btn:hover { background: rgba(255,215,0,0.12); border-color: var(--gold); color: var(--gold); }
.opt-btn.danger { border-color: rgba(244,63,94,0.4); color: #f43f5e; }
.opt-btn.danger:hover { background: rgba(244,63,94,0.1); border-color: #f43f5e; }
.opt-btn.success { border-color: rgba(34,197,94,0.4); color: #22c55e; }
.opt-btn.success:hover { background: rgba(34,197,94,0.1); }
.opt-range { width: 100px; accent-color: var(--gold); cursor: pointer; }
.upload-area {
  border: 1px dashed var(--border);
  border-radius: 8px; padding: 14px;
  text-align: center; cursor: pointer;
  transition: var(--transition);
  font-size: 0.75rem; color: var(--text-dim); margin-top: 8px;
}
.upload-area:hover { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.03); }

/* ===== SHOP ===== */
.shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; margin-top: 16px; }
.shop-card {
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 20px;
  text-align: center; transition: var(--transition);
  cursor: pointer;
}
.shop-card:hover { transform: translateY(-4px); border-color: var(--gold); box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
.shop-card h3 { font-family: var(--font-head); font-size: 0.75rem; letter-spacing: 1px; color: var(--gold); margin-bottom: 8px; }
.shop-card p { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 12px; }
.shop-price { font-family: var(--font-head); font-size: 1.1rem; color: var(--gold2); margin-bottom: 10px; }
.shop-buy-btn {
  width: 100%; padding: 9px;
  background: linear-gradient(90deg, rgba(255,180,70,0.1), rgba(255,215,0,0.1));
  border: 1px solid var(--gold2);
  color: var(--gold);
  font-family: var(--font-head); font-size: 0.65rem; letter-spacing: 2px;
  cursor: pointer; border-radius: 4px; transition: var(--transition);
}
.shop-buy-btn:hover { background: var(--gold); color: #000; }
.shop-buy-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ===== MODALS ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  z-index: 9000;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal-box {
  background: rgba(8,13,24,0.98);
  border: 1px solid var(--border-bright);
  border-radius: 16px;
  padding: 32px;
  max-width: 460px; width: 90%;
  animation: bounceIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
}
@keyframes bounceIn { from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }
.modal-title {
  font-family: var(--font-head); font-size: 0.85rem;
  letter-spacing: 4px; color: var(--gold); margin-bottom: 16px; text-align: center;
}
.modal-input {
  width: 100%; padding: 10px 14px; margin-bottom: 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 6px; color: var(--text);
  font-size: 0.9rem; text-align: center;
}
.modal-input:focus { outline: none; border-color: var(--gold); }
.modal-btns { display: flex; gap: 10px; justify-content: center; }
.modal-btn {
  padding: 10px 24px;
  font-family: var(--font-head); font-size: 0.65rem; letter-spacing: 3px;
  cursor: pointer; border-radius: 4px;
  transition: var(--transition); border: 1px solid transparent;
  clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
}
.modal-btn.confirm { background: #22c55e; color: #000; }
.modal-btn.cancel { background: #f43f5e; color: #fff; }
.modal-btn.secondary { background: rgba(255,215,0,0.1); border-color: var(--gold); color: var(--gold); }
.modal-btn:hover { filter: brightness(1.1); transform: scale(1.03); }

/* ===== NOTIFICATIONS ===== */
.notif-toast {
  position: fixed; bottom: 80px; right: 20px;
  background: rgba(8,13,24,0.98);
  border-radius: 10px; padding: 12px 18px;
  display: flex; align-items: center; gap: 10px;
  z-index: 5000; max-width: 320px;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
}
@keyframes toastIn { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
@keyframes toastOut { to{opacity:0;transform:translateX(40px)} }
.notif-toast.success { border: 1px solid #22c55e; }
.notif-toast.achievement { border: 1px solid var(--gold); }
.notif-toast.error { border: 1px solid #f43f5e; }
.notif-icon { font-size: 1.2rem; }
.notif-text { font-size: 0.8rem; color: var(--text); }
.notif-text strong { display: block; font-family: var(--font-head); font-size: 0.65rem; letter-spacing: 2px; color: var(--gold); }

/* Confetti */
.confetti-p {
  position: fixed; pointer-events: none; z-index: 8000;
  border-radius: 2px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

/* Level up modal */
.levelup-modal {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background: rgba(8,13,24,0.98);
  border: 2px solid var(--gold);
  border-radius: 20px; padding: 40px;
  text-align: center; z-index: 9500;
  box-shadow: 0 0 60px rgba(255,215,0,0.3);
  animation: bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  min-width: 280px;
}
.levelup-modal h2 { font-family: var(--font-head); font-size: 0.75rem; letter-spacing: 6px; color: var(--gold2); margin-bottom: 8px; }
.levelup-modal .lv-num { font-family: var(--font-head); font-size: 4rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 30px rgba(255,215,0,0.6); animation: lvPulse 1s ease infinite; }
@keyframes lvPulse { 0%,100%{text-shadow:0 0 30px rgba(255,215,0,0.6)} 50%{text-shadow:0 0 60px rgba(255,215,0,0.9)} }
.levelup-modal p { font-size: 0.8rem; color: var(--text-dim); margin-top: 8px; }
.lv-close { margin-top: 16px; padding: 8px 24px; background: var(--gold); color: #000; border: none; font-family: var(--font-head); font-size: 0.65rem; letter-spacing: 3px; cursor: pointer; border-radius: 4px; }

/* ===== MUSIC PLAYER ===== */
.music-player {
  position: fixed; bottom: 16px; right: 16px;
  background: rgba(2,4,8,0.95);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: 40px;
  padding: 6px 14px; display: flex; align-items: center; gap: 10px;
  z-index: 4000;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
}
.mp-btn {
  background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.3);
  color: var(--gold); width: 28px; height: 28px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 0.75rem; transition: var(--transition);
}
.mp-btn:hover { background: var(--gold); color: #000; }
.mp-label { font-size: 0.65rem; color: var(--text-dim); max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mp-vol { width: 60px; accent-color: var(--gold); cursor: pointer; }
.mp-upload { font-size: 0.65rem; color: var(--gold2); cursor: pointer; padding: 2px 8px; border: 1px solid rgba(255,215,0,0.2); border-radius: 10px; transition: var(--transition); }
.mp-upload:hover { border-color: var(--gold); color: var(--gold); }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.3); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold); }

/* ===== AMBIENCE PER SECTION ===== */
.amb-routine { --section-color: #3b82f6; }
.amb-exp { --section-color: #a855f7; }
.amb-stats { --section-color: #22c55e; }
.amb-swag { --section-color: #eab308; }
.amb-friends { --section-color: #f43f5e; }
.amb-agenda { --section-color: #06b6d4; }

/* ===== FULL CALENDAR ===== */
.cal-modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(12px);z-index:9100;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s ease; }
.cal-modal { background:rgba(6,12,24,0.99);border:1px solid rgba(6,182,212,0.4);border-radius:20px;padding:28px;width:90%;max-width:700px;max-height:90vh;overflow-y:auto; }
.cal-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:20px; }
.cal-title { font-family:var(--font-head);font-size:0.85rem;letter-spacing:4px;color:#06b6d4; }
.cal-nav-btn { background:rgba(6,182,212,0.1);border:1px solid rgba(6,182,212,0.3);color:#06b6d4;width:36px;height:36px;border-radius:50%;cursor:pointer;transition:var(--transition);font-size:0.8rem; }
.cal-nav-btn:hover { background:rgba(6,182,212,0.25); }
.cal-grid { display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px; }
.cal-day-label { text-align:center;font-family:var(--font-head);font-size:0.55rem;letter-spacing:2px;color:var(--text-dim);padding:4px 0; }
.cal-day { min-height:60px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:8px;padding:4px;cursor:pointer;transition:var(--transition);position:relative; }
.cal-day:hover { background:rgba(6,182,212,0.06);border-color:rgba(6,182,212,0.3); }
.cal-day.today { border-color:rgba(6,182,212,0.6);background:rgba(6,182,212,0.05); }
.cal-day.has-events::after { content:'';position:absolute;bottom:4px;right:4px;width:6px;height:6px;background:#f43f5e;border-radius:50; }
.cal-day.other-month { opacity:0.3; }
.cal-day-num { font-family:var(--font-head);font-size:0.7rem;color:var(--text);margin-bottom:2px; }
.cal-day.today .cal-day-num { color:#06b6d4; }
.cal-event-dot { font-size:0.55rem;color:#06b6d4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block; }
.cal-events-panel { background:rgba(0,0,0,0.3);border:1px solid rgba(6,182,212,0.2);border-radius:10px;padding:14px;margin-top:12px; }
.cal-events-panel h4 { font-family:var(--font-head);font-size:0.65rem;letter-spacing:3px;color:#06b6d4;margin-bottom:10px; }
.cal-close { background:rgba(244,63,94,0.1);border:1px solid rgba(244,63,94,0.3);color:#f43f5e;padding:8px 20px;border-radius:6px;cursor:pointer;font-family:var(--font-head);font-size:0.65rem;letter-spacing:2px;margin-top:14px;width:100%;transition:var(--transition); }
.cal-close:hover { background:rgba(244,63,94,0.2); }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .hub-hero { grid-template-columns: 1fr; }
  .swag-sidebar { flex: 0 0 100%; }
  .swag-layout { flex-direction: column; }
  .game-header { padding: 8px 12px; }
  .menu-glitch { font-size: clamp(1.5rem,8vw,3rem); }
}

/* ===== RANK SYSTEM (Solo Leveling) ===== */
.rank-badge-hero {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-head); font-size: 0.8rem; letter-spacing: 3px;
  padding: 6px 18px; border-radius: 4px;
  animation: rankGlow 2s ease infinite;
  clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
}
@keyframes rankGlow { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.3)} }
.rank-E { background:rgba(100,100,120,0.2); border:1px solid #64646e; color:#9ca3af; }
.rank-D { background:rgba(34,197,94,0.1); border:1px solid #22c55e; color:#22c55e; }
.rank-C { background:rgba(59,130,246,0.1); border:1px solid #3b82f6; color:#3b82f6; }
.rank-B { background:rgba(168,85,247,0.15); border:1px solid #a855f7; color:#a855f7; }
.rank-A { background:rgba(234,179,8,0.15); border:1px solid #eab308; color:#eab308; }
.rank-S { background:rgba(255,100,0,0.15); border:1px solid #f97316; color:#f97316; }
.rank-SS { background:rgba(239,68,68,0.2); border:1px solid #ef4444; color:#ef4444; }
.rank-SSS { background:linear-gradient(90deg,rgba(255,215,0,0.2),rgba(239,68,68,0.2)); border:1px solid #FFD700; color:#FFD700; }

.rank-up-overlay {
  position: fixed; inset:0; z-index: 10000;
  background: rgba(0,0,0,0.95);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
  animation: rankUpReveal 3.5s ease forwards;
}
@keyframes rankUpReveal {
  0%{opacity:0} 10%{opacity:1} 80%{opacity:1} 100%{opacity:0;pointer-events:none}
}

<script>
// ===================================================================
// ====================== SOUND ENGINE ================================
// ===================================================================
let sfxEnabled = true;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playSound(type) {
  if (!sfxEnabled) return;
  try {
    const ctx = getAudioCtx();
    const master = ctx.createGain();
    master.connect(ctx.destination);
    master.gain.value = 0.12;

    const sounds = {
      click: () => {
        // Soft mechanical click
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/data.length, 2);
        const src = ctx.createBufferSource(); src.buffer = buf;
        const filt = ctx.createBiquadFilter(); filt.type = 'highpass'; filt.frequency.value = 1000;
        src.connect(filt); filt.connect(master); src.start();
      },
      nav: () => {
        // Synth whoosh
        const osc = ctx.createOscillator(); const g = ctx.createGain();
        osc.connect(g); g.connect(master);
        osc.type = 'sine'; osc.frequency.setValueAtTime(220, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.12);
        g.gain.setValueAtTime(0.08, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc.start(); osc.stop(ctx.currentTime + 0.15);
      },
      task: () => {
        // Satisfying ding
        [523.25, 659.25].forEach((freq, i) => {
          const osc = ctx.createOscillator(); const g = ctx.createGain();
          osc.connect(g); g.connect(master);
          osc.type = 'triangle'; osc.frequency.value = freq;
          g.gain.setValueAtTime(0, ctx.currentTime + i * 0.07);
          g.gain.linearRampToValueAtTime(0.1, ctx.currentTime + i * 0.07 + 0.01);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.07 + 0.3);
          osc.start(ctx.currentTime + i * 0.07); osc.stop(ctx.currentTime + i * 0.07 + 0.3);
        });
      },
      coin: () => {
        // Golden coin clink
        const osc = ctx.createOscillator(); const g = ctx.createGain();
        osc.connect(g); g.connect(master);
        osc.type = 'sine'; osc.frequency.setValueAtTime(1200, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.15);
        g.gain.setValueAtTime(0.12, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        osc.start(); osc.stop(ctx.currentTime + 0.2);
      },
      levelup: () => {
        // Epic level up fanfare
        const notes = [261.63, 329.63, 392, 523.25, 659.25, 783.99];
        notes.forEach((freq, i) => {
          const osc = ctx.createOscillator(); const g = ctx.createGain();
          const dist = ctx.createWaveShaper();
          const curve = new Float32Array(256);
          for (let j = 0; j < 256; j++) { const x = j*2/256-1; curve[j] = (3+10)*x*20*Math.PI/180/(Math.PI+10*Math.abs(x)); }
          dist.curve = curve;
          osc.connect(dist); dist.connect(g); g.connect(master);
          osc.type = 'sawtooth'; osc.frequency.value = freq;
          const t = ctx.currentTime + i * 0.1;
          g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.06, t + 0.02);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
          osc.start(t); osc.stop(t + 0.4);
        });
      },
      buy: () => {
        // Cash register feel
        [800, 1000, 1200].forEach((freq, i) => {
          const osc = ctx.createOscillator(); const g = ctx.createGain();
          osc.connect(g); g.connect(master);
          osc.type = 'square'; osc.frequency.value = freq;
          const t = ctx.currentTime + i * 0.05;
          g.gain.setValueAtTime(0.05, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
          osc.start(t); osc.stop(t + 0.1);
        });
      },
      back: () => {
        const osc = ctx.createOscillator(); const g = ctx.createGain();
        osc.connect(g); g.connect(master);
        osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.12);
        g.gain.setValueAtTime(0.07, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc.start(); osc.stop(ctx.currentTime + 0.15);
      },
      error: () => {
        const osc = ctx.createOscillator(); const g = ctx.createGain();
        osc.connect(g); g.connect(master);
        osc.type = 'sawtooth'; osc.frequency.value = 180;
        g.gain.setValueAtTime(0.08, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
        osc.start(); osc.stop(ctx.currentTime + 0.25);
      }
    };
    if (sounds[type]) sounds[type]();
  } catch(e) {}
}

let musicPlaylist = [], musicIdx = 0, musicAudio = null, musicPlaying = false;
const mpPlay = document.getElementById('mpPlay');
const mpLabel = document.getElementById('mpLabel');
const mpVol = document.getElementById('mpVol');

document.getElementById('musicFilesInput').onchange = (e) => {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  musicPlaylist = files.map(f => ({ name: f.name.replace(/\.[^/.]+$/,''), url: URL.createObjectURL(f) }));
  musicIdx = 0;
  loadTrack(musicIdx);
  showToast('🎵 Playlist carregada', `${musicPlaylist.length} músicas`, 'success');
};
function loadTrack(idx) {
  if (!musicPlaylist.length) return;
  if (musicAudio) { musicAudio.pause(); musicAudio.src = ''; }
  const track = musicPlaylist[idx];
  musicAudio = new Audio(track.url);
  musicAudio.volume = mpVol.value / 100;
  musicAudio.loop = musicPlaylist.length === 1;
  musicAudio.onended = () => { musicIdx = (musicIdx + 1) % musicPlaylist.length; loadTrack(musicIdx); if (musicPlaying) musicAudio.play(); };
  mpLabel.textContent = track.name;
  if (musicPlaying) musicAudio.play().catch(()=>{});
}
mpPlay.onclick = () => {
  if (!musicPlaylist.length) { showToast('❌ Nenhuma música', 'Carregue músicas mp3', 'error'); return; }
  if (musicPlaying) { musicAudio.pause(); musicPlaying = false; mpPlay.innerHTML = '<i class="fas fa-play"></i>'; }
  else { musicAudio.play().catch(()=>{}); musicPlaying = true; mpPlay.innerHTML = '<i class="fas fa-pause"></i>'; }
};
document.getElementById('mpPrev').onclick = () => { musicIdx = (musicIdx - 1 + musicPlaylist.length) % musicPlaylist.length; loadTrack(musicIdx); if (musicPlaying) musicAudio.play(); };
document.getElementById('mpNext').onclick = () => { musicIdx = (musicIdx + 1) % musicPlaylist.length; loadTrack(musicIdx); if (musicPlaying) musicAudio.play(); };
mpVol.oninput = () => { if (musicAudio) musicAudio.volume = mpVol.value / 100; };

function confetti() {
  const colors = ['#FFD700','#FFB347','#22c55e','#f43f5e','#3b82f6','#a855f7'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div'); el.className = 'confetti-p';
    const size = Math.random() * 10 + 5;
    Object.assign(el.style, {
      left: Math.random() * 100 + 'vw', top: '-10px',
      width: size + 'px', height: size * 0.6 + 'px',
      background: colors[Math.floor(Math.random() * colors.length)],
      animationDuration: (Math.random() * 2 + 1.5) + 's',
      animationDelay: Math.random() * 0.5 + 's',
      transform: `rotate(${Math.random()*360}deg)`,
    });
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

// ======================== EXP SYSTEM ================================
// ===================================================================
const EXP_TABLE = [0, 50, 150, 300, 550, 950, 1500, 2300, 3400, 5000, 7000];
// 11 levels: 1-10 visible, each check = meaningful progress
let mainExp = { SHAPE:0, GIRLS:0, SWAG:0, MIND:0, SOCIAL:0, CASH:0 };
function loadExp() { let s = localStorage.getItem('MainStatsExp'); if(s) try { mainExp = {...mainExp,...JSON.parse(s)}; } catch(e){}
  // ensure SOCIAL exists (migration from old saves)
  if (mainExp.SOCIAL === undefined) mainExp.SOCIAL = 0;
}
function saveExp() { localStorage.setItem('MainStatsExp', JSON.stringify(mainExp)); }
function getLevel(stat) { let e = mainExp[stat]; for(let i=EXP_TABLE.length-1;i>=0;i--) if(e>=EXP_TABLE[i]) return i+1; return 1; }
function getProgress(stat) {
  let e = mainExp[stat], lv = getLevel(stat);
  let lo = lv > 1 ? EXP_TABLE[lv-1] : 0, hi = EXP_TABLE[lv] ?? lo+1000;
  let cur = e - lo, need = hi - lo;
  return { cur, need, pct: need > 0 ? Math.min(100, (cur/need)*100) : 100, lv };
}
function addExp(stat, amount) {
  let oldOv = getOverall();
  let oldLv = getLevel(stat);
  mainExp[stat] = (mainExp[stat]||0) + amount;
  let newLv = getLevel(stat);
  saveExp();
  if (newLv > oldLv) {
    playSound('levelup'); confetti();
    showLevelUpModal(stat, newLv);
    showAchievement(`⬆️ ${stat} → NV ${newLv}`, `Você evoluiu em ${stat}!`);
    addToLog(`⬆️ LEVEL UP em ${stat} → Nível ${newLv}`, statColors[stat]);
  }
  let newOv = getOverall();
  checkRankUp(oldOv, newOv);
  refreshStatsUI();
}
function showLevelUpModal(stat, lv) {
  const m = document.createElement('div'); m.className = 'levelup-modal';
  m.innerHTML = `<h2>LEVEL UP!</h2><div class="lv-num">${lv}</div><p>${stat} alcançou o nível ${lv}</p><button class="lv-close" onclick="this.closest('.levelup-modal').remove()">CONTINUAR</button>`;
  document.body.appendChild(m);
  setTimeout(() => m.remove(), 5000);
}

function loadGameData() {
  let s = localStorage.getItem('LifeRPG_V17');
  if (s) { try { let p = JSON.parse(s); if(p.heroName) gameData = p; else gameData.categories = getDefaultCategories(); } catch(e){ gameData.categories = getDefaultCategories(); } }
  else gameData.categories = getDefaultCategories();
  if (!gameData.categories || gameData.categories.length < 11) gameData.categories = getDefaultCategories();
  syncCats();
}
function saveGameData() { localStorage.setItem('LifeRPG_V17', JSON.stringify(gameData)); }
function syncCats() {
  for (let cat of gameData.categories) {
    for (let sub of cat.subs) {
      if (!sub.tasks) sub.tasks = [];
      if (!sub.expPoints) sub.expPoints = 0;
      // Update maxLevel to match tasks length
      sub.maxLevel = sub.tasks.length;
      let maxComp = 0;
      for (let t of sub.tasks) if (t.completed) maxComp = t.levelRequired;
      sub.currentLevel = Math.min(maxComp, sub.maxLevel);
    }
  }
}

let agendaEvents = [];

function getTodayStr() { return new Date().toISOString().split('T')[0]; }
function todayEvents() { return agendaEvents.filter(e => e.date === getTodayStr()); }
function renderAgendaDropdown() {
  const list = document.getElementById('agendaEventsList');
  const dot = document.getElementById('agendaDot');
  if (!list) return;
  const evs = todayEvents();
  dot.style.display = evs.length ? 'block' : 'none';
  if (!evs.length) { list.innerHTML = '<div style="color:var(--text-dim);font-size:0.75rem;text-align:center;padding:10px;">Nenhum compromisso hoje</div>'; return; }
  list.innerHTML = evs.map(ev => `
    <div class="agenda-event" data-id="${ev.id}">
      <span class="agenda-event-time">${ev.time}</span>
      <span class="agenda-event-name">${ev.emoji} ${ev.name}</span>
      <span style="margin-left:auto;color:var(--text-dim);font-size:0.65rem;cursor:pointer;" onclick="deleteAgendaEvent('${ev.id}')">✕</span>

// Full calendar open
function openFullCalendar() {
  document.getElementById('agendaDropdown').classList.remove('open');
  let calDate = new Date();
  function renderCal() {
    const existing = document.getElementById('fullCalModal');
    if (existing) existing.remove();
    const ov = document.createElement('div'); ov.className='cal-modal-overlay'; ov.id='fullCalModal';
    const year = calDate.getFullYear(), month = calDate.getMonth();
    const monthNames = ['JANEIRO','FEVEREIRO','MARÇO','ABRIL','MAIO','JUNHO','JULHO','AGOSTO','SETEMBRO','OUTUBRO','NOVEMBRO','DEZEMBRO'];
    const dayNames = ['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const prevDays = new Date(year, month, 0).getDate();
    const todayD = new Date(); const todayStr2 = getTodayStr();
    let selectedDate = todayStr2;
    function pad(n){return String(n).padStart(2,'0');}
    function dateStr(y,m,d){return `${y}-${pad(m+1)}-${pad(d)}`;}
    function eventsForDate(ds){ return agendaEvents.filter(e=>e.date===ds); }
    function buildGrid(){
      let cells='';
      dayNames.forEach(d=>{ cells+=`<div class="cal-day-label">${d}</div>`; });
      for(let i=0;i<firstDay;i++){
        const d=prevDays-firstDay+1+i; const ds=dateStr(year,month-1,d);
        const hasEv=eventsForDate(ds).length>0;
        cells+=`<div class="cal-day other-month ${hasEv?'has-events':''}" data-date="${ds}"><div class="cal-day-num">${d}</div>${eventsForDate(ds).slice(0,2).map(e=>`<span class="cal-event-dot">${e.emoji}${e.name}</span>`).join('')}</div>`;
      }
      for(let d=1;d<=daysInMonth;d++){
        const ds=dateStr(year,month,d);
        const isToday=ds===todayStr2; const evs=eventsForDate(ds);
        cells+=`<div class="cal-day ${isToday?'today':''} ${evs.length?'has-events':''} ${ds===selectedDate?'sel-day':''}" data-date="${ds}" style="${ds===selectedDate?'border-color:#06b6d4;background:rgba(6,182,212,0.1);':''}"><div class="cal-day-num">${d}</div>${evs.slice(0,2).map(e=>`<span class="cal-event-dot">${e.emoji}${e.name}</span>`).join('')}</div>`;
      }
      const remaining = 42-firstDay-daysInMonth;
      for(let d=1;d<=remaining;d++){
        const ds=dateStr(year,month+1,d); const hasEv=eventsForDate(ds).length>0;
        cells+=`<div class="cal-day other-month ${hasEv?'has-events':''}" data-date="${ds}"><div class="cal-day-num">${d}</div></div>`;
      }
      return cells;
    }
    function buildEventPanel(ds){
      const evs=eventsForDate(ds);
      if(!evs.length) return '<div style="color:var(--text-dim);font-size:0.8rem;text-align:center;padding:8px;">Sem compromissos neste dia</div>';
      return evs.map(ev=>`<div class="agenda-event"><span class="agenda-event-time">${ev.time}</span><span class="agenda-event-name">${ev.emoji} ${ev.name}</span><span style="margin-left:auto;color:var(--text-dim);font-size:0.65rem;cursor:pointer;" onclick="deleteAgendaEvent('${ev.id}');document.getElementById('fullCalModal').remove();openFullCalendar();">✕</span></div>`).join('');
    }
    ov.innerHTML=`<div class="cal-modal">
      <div class="cal-header">
        <button class="cal-nav-btn" id="calPrev">◀</button>
        <div class="cal-title">${monthNames[month]} ${year}</div>
        <button class="cal-nav-btn" id="calNext">▶</button>
      </div>
      <div class="cal-grid" id="calGrid">${buildGrid()}</div>
      <div class="cal-events-panel"><h4><i class="fas fa-calendar-day"></i> ${selectedDate}</h4><div id="calEvPanel">${buildEventPanel(selectedDate)}</div></div>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <button class="agenda-add-btn" id="calAddEv" style="flex:1;">+ ADICIONAR NESTE DIA</button>
        <button class="cal-close" style="flex:0.5;margin-top:0;">✕ FECHAR</button>
      </div>
    </div>`;
    document.body.appendChild(ov);
    ov.querySelector('.cal-close').onclick=()=>ov.remove();
    ov.querySelector('#calPrev').onclick=()=>{calDate=new Date(year,month-1,1);ov.remove();renderCal();};
    ov.querySelector('#calNext').onclick=()=>{calDate=new Date(year,month+1,1);ov.remove();renderCal();};
    ov.querySelectorAll('.cal-day').forEach(cell=>{
      cell.onclick=()=>{
        selectedDate=cell.dataset.date;
        ov.querySelectorAll('.cal-day').forEach(c=>{c.style.borderColor='';c.style.background='';});
        cell.style.borderColor='#06b6d4'; cell.style.background='rgba(6,182,212,0.1)';
        ov.querySelector('#calEvPanel').innerHTML=buildEventPanel(selectedDate);
        ov.querySelector('.cal-events-panel h4').innerHTML=`<i class="fas fa-calendar-day"></i> ${selectedDate}`;
      };
    });
    ov.querySelector('#calAddEv').onclick=()=>{
      ov.remove();
      const modal=openModal(`<div class="modal-title">📅 ADICIONAR COMPROMISSO</div>
        <input class="modal-input" id="agEvName" placeholder="Nome" style="margin-bottom:8px;">
        <input class="modal-input" id="agEvTime" type="time" style="margin-bottom:8px;">
        <input class="modal-input" id="agEvDate" type="date" value="${selectedDate}" style="margin-bottom:8px;">
        <input class="modal-input" id="agEvEmoji" placeholder="Emoji (ex: 🏋️)" style="margin-bottom:16px;">
        <div class="modal-btns"><button class="modal-btn confirm" id="agC">SALVAR</button><button class="modal-btn cancel" id="agX">CANCELAR</button></div>`);
      modal.querySelector('#agC').onclick=()=>{
        const name=modal.querySelector('#agEvName').value.trim();
        const time=modal.querySelector('#agEvTime').value;
        const date=modal.querySelector('#agEvDate').value;
        const emoji=modal.querySelector('#agEvEmoji').value.trim()||'📌';
        if(!name||!time||!date){showToast('❌','Preencha todos os campos','error');return;}
        agendaEvents.push({id:Date.now().toString(),name,time,date,emoji});
        agendaEvents.sort((a,b)=>a.time.localeCompare(b.time));
        saveAgenda();modal.remove();renderAgendaDropdown();openFullCalendar();
      };
      modal.querySelector('#agX').onclick=()=>{modal.remove();openFullCalendar();};
    };
    ov.onclick=(e)=>{if(e.target===ov)ov.remove();};
  }
  renderCal();
}

  let rank = RANKS[0];
  for (let r of RANKS) { if (ov >= r.min) rank = r; }
  return rank;
}

function getRankBadgeHTML(rank) {
  return `<span class="rank-badge-hero rank-${rank.key}" style="border-color:${rank.color};color:${rank.color};background:${rank.bg};">

}

function checkRankUp(oldOv, newOv) {
  const oldRank = getCurrentRank(oldOv);

  if (newRank.key !== oldRank.key && newOv > oldOv) {
    triggerRankUpCeremony(newRank);

}

let dailyMissions = { date:'', missions:[], progress:{}, claimed:{} };

function loadMissions() { let s = localStorage.getItem('DailyMissions_V18'); if(s) try { dailyMissions = JSON.parse(s); } catch(e){} }
function saveMissions() { localStorage.setItem('DailyMissions_V18', JSON.stringify(dailyMissions)); }
function initDailyMissions() {
  const today = getTodayStr();
  if (dailyMissions.date !== today) {
    // Pick 4 random missions
    const shuffled = [...MISSION_TEMPLATES].sort(() => Math.random() - 0.5);
    dailyMissions = { date: today, missions: shuffled.slice(0,4).map(m=>m.id), progress:{}, claimed:{} };
    saveMissions();
  }
}

function getMissionProgress(mId) {
  const m = MISSION_TEMPLATES.find(t=>t.id===mId);
  if (!m) return 0;
  if (m.type === 'routine_daily') {
    return Object.values(routineData.daily).filter(v=>v).length;
  } else if (m.type === 'routine_shape') {
    return [2,3].filter(i => routineData.daily[i]).length; // academia + futebol
  } else if (m.type === 'routine_mind') {
    return [7,10].filter(i => routineData.daily[i]).length; // inglês + prog
  } else if (m.type === 'earn_coins') {
    return dailyMissions.progress[mId] || 0;
  } else if (m.type === 'complete_exp') {
    return dailyMissions.progress[mId] || 0;
  } else if (m.type === 'add_agenda') {
    return agendaEvents.filter(e=>e.date===getTodayStr()).length;
  } else if (m.type === 'save_coins') {
    return m.target; // always completable for now
  }
  return dailyMissions.progress[mId] || 0;
}

function renderMissions() {
  initDailyMissions();
  const panel = document.getElementById('sectionPanel');
  const activeMissions = dailyMissions.missions.map(id => MISSION_TEMPLATES.find(t=>t.id===id)).filter(Boolean);
  panel.innerHTML = `<div class="section-wrap" style="--section-color:#06b6d4;">
    <div class="section-title" style="color:#06b6d4;"><i class="fas fa-scroll"></i><span>MISSÕES DO DIA · ${getTodayStr()}</span><div class="title-line" style="background:linear-gradient(90deg,#06b6d4,transparent);"></div></div>
    <p style="font-size:0.75rem;color:var(--text-dim);margin-bottom:16px;">Missões reiniciam à meia-noite. Complete para ganhar bônus!</p>
    <div id="missionsList"></div>
    <div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border);">
      <div class="section-title" style="color:#06b6d4;font-size:0.65rem;"><i class="fas fa-trophy"></i><span>MISSÕES SEMANAIS</span><div class="title-line" style="background:linear-gradient(90deg,#06b6d4,transparent);"></div></div>
      ${renderWeeklyMissionsHTML()}
    </div>
  </div>`;

  const list = document.getElementById('missionsList');
  activeMissions.forEach(m => {
    const prog = getMissionProgress(m.id);
    const done = prog >= m.target;
    const claimed = dailyMissions.claimed[m.id];
    const pct = m.target > 0 ? Math.min(100,(prog/m.target)*100) : 100;
    const card = document.createElement('div');
    card.className = `mission-card ${(done&&claimed)?'done':''}`;
    card.innerHTML = `
      <div class="mission-icon">${m.icon}</div>
      <div class="mission-info">
        <div class="mission-name">${m.name}</div>
        <div style="font-size:0.72rem;color:var(--text-dim);margin-bottom:4px;">${m.desc}</div>
        <div style="height:4px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;">
          <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,#06b6d4,#a855f7);transition:width 0.5s;"></div>
        </div>
        <div class="mission-reward" style="margin-top:4px;">+${m.reward.coins}🪙 · ${Object.entries(m.reward.exp).map(([s,v])=>`+${v}${s}`).join(' ')}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
        <span class="mission-prog-text">${Math.min(prog,m.target)}/${m.target}</span>
        ${done && !claimed ? `<button class="mission-claim-btn" data-id="${m.id}">COLETAR</button>` : done && claimed ? `<span style="color:#22c55e;font-size:0.7rem;">✓</span>` : ''}
      </div>`;
    list.appendChild(card);
  });
  list.querySelectorAll('.mission-claim-btn').forEach(btn => {
    btn.onclick = () => claimMission(btn.dataset.id);
  });
}

function claimMission(mId) {
  const m = MISSION_TEMPLATES.find(t=>t.id===mId);
  if (!m || dailyMissions.claimed[mId]) return;
  dailyMissions.claimed[mId] = true;
  saveMissions();
  addCoins(m.reward.coins);
  for (let [stat, val] of Object.entries(m.reward.exp)) addExp(stat, val);
  playSound('levelup');
  showAchievement(`✅ Missão: ${m.name}`, `+${m.reward.coins} coins coletados!`);
  addToLog(`✅ Missão concluída: ${m.name} (+${m.reward.coins}🪙)`, '#06b6d4');
  renderMissions();
}

let dungeonProgress = {};
function loadDungeon() { let s = localStorage.getItem('DungeonProgress_V18'); if(s) try { dungeonProgress = JSON.parse(s); } catch(e){} }
function saveDungeon() { localStorage.setItem('DungeonProgress_V18', JSON.stringify(dungeonProgress)); }

function getCurrentDungeon() {
  const month = new Date().getMonth();
  return DUNGEONS[month];
}

function getDungeonKey() { const d = new Date(); return `${d.getFullYear()}_${d.getMonth()}`; }

  const dungeon = getCurrentDungeon();
  const key = getDungeonKey();
  if (!dungeonProgress[key]) dungeonProgress[key] = { objsDone: [], claimed: false };
  const dp = dungeonProgress[key];
  const daysLeft = new Date(new Date().getFullYear(), new Date().getMonth()+1, 0).getDate() - new Date().getDate();
  const donePct = dp.objsDone.length / dungeon.objectives.length * 100;

  panel.innerHTML = `<div class="section-wrap" style="--section-color:${dungeon.color};">

    </div>
    <div style="margin-top:16px;">
      <div class="section-title" style="color:${dungeon.color};font-size:0.65rem;"><i class="fas fa-calendar-alt"></i><span>PRÓXIMAS DUNGEONS</span><div class="title-line" style="background:linear-gradient(90deg,${dungeon.color},transparent);"></div></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:10px;">
        ${DUNGEONS.slice(0,12).filter((_,i)=>i!==new Date().getMonth()).slice(0,4).map(d=>`
          <div style="background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px;">

    el.onclick = () => {
      const idx = parseInt(el.dataset.idx);
      const dp2 = dungeonProgress[getDungeonKey()];
      if (!dp2.objsDone.includes(idx)) {
        dp2.objsDone.push(idx);
        saveDungeon();
        addToLog(`🎯 Dungeon: ${dungeon.objectives[idx]}`, dungeon.color);
        playSound('task');
        renderDungeon();
      }
    };
  });

  const claimBtn = document.getElementById('dungeonClaim');
  if (claimBtn) {
    claimBtn.onclick = () => {
      dungeonProgress[getDungeonKey()].claimed = true;
      saveDungeon();
      addCoins(dungeon.reward.coins);
      for (let [stat,val] of Object.entries(dungeon.reward.exp)) addExp(stat, val);

      renderDungeon();
    };
  }
}

let lastActiveDate = '';
function loadLastActive() { lastActiveDate = localStorage.getItem('LastActiveDate_V18') || ''; }
function saveLastActive() { localStorage.setItem('LastActiveDate_V18', getTodayStr()); }

function checkPenalty() {
  if (!lastActiveDate || lastActiveDate === getTodayStr()) return;
  const last = new Date(lastActiveDate);
  const now = new Date();
  const diffDays = Math.floor((now - last) / (1000 * 60 * 60 * 24));
  if (diffDays >= 2) {
    showPenaltyModal(diffDays);
  }
  saveLastActive();
}

function showPenaltyModal(days) {
  const penalties = [
    { task:'Fazer 50 flexões agora', done:false },
    { task:'Beber 500ml de água agora', done:false },
    { task:'Escrever 3 objetivos do dia', done:false },
    { task:'Fazer 1 minuto de prancha', done:false },
  ];
  const ov = document.createElement('div'); ov.className='penalty-overlay'; ov.id='penaltyOverlay';
  ov.innerHTML = `
    <div class="penalty-box">
      <div class="penalty-title">⚠️ SISTEMA DE PENALIDADE</div>
      <div class="penalty-text">
        Você ficou <strong style="color:#ef4444;">${days} dias</strong> sem treinar.<br>
        O Sistema não tolera fraqueza, Hunter.<br>
        Complete as missões punitivas para continuar.
      </div>
      <div class="penalty-tasks" id="penaltyTaskList">
        ${penalties.map((p,i) => `<div class="penalty-task" data-idx="${i}"><span>⚡</span><span>${p.task}</span></div>`).join('')}
      </div>
      <button class="penalty-accept" id="penaltyAccept" disabled>COMPLETAR MISSÃO PUNITIVA</button>
    </div>`;
  document.body.appendChild(ov);
  let doneTasks = new Set();
  ov.querySelectorAll('.penalty-task').forEach(el => {
    el.onclick = () => {
      el.classList.add('done'); doneTasks.add(el.dataset.idx);
      playSound('task');
      if (doneTasks.size >= 2) document.getElementById('penaltyAccept').disabled = false;
    };
  });
  document.getElementById('penaltyAccept').onclick = () => {
    ov.remove();
    showToast('⚡ Penalidade cumprida', 'Agora volte ao treino, Hunter!', 'achievement');
    addToLog(`⚠️ Penalidade cumprida após ${days} dias inativo`, '#ef4444');
  };
}

let notifPermission = Notification?.permission || 'default';

function requestNotifPermission() {
  if ('Notification' in window) {
    Notification.requestPermission().then(perm => {
      notifPermission = perm;
      if (perm === 'granted') {
        showToast('🔔 Notificações ativas!', 'Você receberá alertas dos compromissos', 'success');
        scheduleAgendaNotifications();
      }
    });
  }
}

function scheduleAgendaNotifications() {
  if (!('Notification' in window) || notifPermission !== 'granted') return;
  const today = getTodayStr();
  const todayEvs = agendaEvents.filter(e => e.date === today);
  todayEvs.forEach(ev => {
    const [h,m] = ev.time.split(':').map(Number);
    // Notify 2h before
    const notifTime = new Date();
    notifTime.setHours(h - 2, m, 0, 0);
    const msUntil = notifTime - new Date();
    if (msUntil > 0) {
      setTimeout(() => {
        new Notification(`⏰ ${ev.emoji} ${ev.name}`, {
          body: `Em 2 horas — ${ev.time}`,
          icon: '⚡',
          tag: ev.id
        });
      }, msUntil);
    }
  });
}

// Avatar
function drawFallbackAvatar(canvas) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);
  const grd = ctx.createRadialGradient(w/2,h/2,10,w/2,h/2,w/2);
  grd.addColorStop(0,'#1a1230'); grd.addColorStop(1,'#080d18');
  ctx.fillStyle = grd; ctx.fillRect(0,0,w,h);
  // head
  ctx.fillStyle = '#FBD9B0'; ctx.beginPath(); ctx.arc(w/2, h*0.42, h*0.22, 0, Math.PI*2); ctx.fill();
  // hair
  ctx.fillStyle = '#2C1E12'; ctx.beginPath(); ctx.arc(w/2, h*0.32, h*0.22, Math.PI, 0); ctx.fill();
  ctx.fillRect(w/2-h*0.22, h*0.32, h*0.44, h*0.1);
  // eyes
  ctx.fillStyle = '#2C1E12';
  ctx.beginPath(); ctx.arc(w/2-18, h*0.41, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(w/2+18, h*0.41, 4, 0, Math.PI*2); ctx.fill();
  // smile
  ctx.strokeStyle = '#c0825e'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(w/2, h*0.46, 10, 0.1, Math.PI-0.1); ctx.stroke();
  // body
  ctx.fillStyle = '#1e3a5f'; ctx.beginPath(); ctx.arc(w/2, h*0.8, h*0.28, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FBD9B0'; ctx.beginPath(); ctx.arc(w/2, h*0.62, h*0.08, 0, Math.PI*2); ctx.fill();
}

function renderRoutine() {
  const panel = document.getElementById('sectionPanel');
  let tasks, dataObj;
  if (currentRoutineTab==='daily') { tasks=dailyTasks; dataObj=routineData.daily; }
  else if (currentRoutineTab==='weekly') { tasks=weeklyTasks; dataObj=routineData.weekly; }
  else { tasks=monthlyTasks; dataObj=routineData.monthly; }
  let done = Object.values(dataObj).filter(v=>v).length;
  let total = tasks.length;

  panel.innerHTML = `
    <div class="section-wrap amb-routine">
      <div class="section-title" style="--section-color:#3b82f6;color:#3b82f6;">
        <i class="fas fa-calendar-alt"></i><span>ROTINA</span><div class="title-line"></div>
      </div>
      <div class="tabs">
        <div class="tab ${currentRoutineTab==='daily'?'active':''}" data-tab="daily">📅 DIÁRIA</div>
        <div class="tab ${currentRoutineTab==='weekly'?'active':''}" data-tab="weekly">📆 SEMANAL</div>
        <div class="tab ${currentRoutineTab==='monthly'?'active':''}" data-tab="monthly">📅 MENSAL</div>
      </div>
      <div class="routine-progress" style="--section-color:#3b82f6;">
        <span style="font-family:var(--font-head);font-size:0.65rem;color:#3b82f6;">PROGRESSO</span>
        <div class="routine-progress-bar"><div class="routine-progress-fill" style="width:${total?((done/total)*100):0}%"></div></div>
        <span style="font-family:var(--font-head);font-size:0.65rem;color:var(--text-dim);">${done}/${total}</span>
      </div>
      <div id="routineItems"></div>
      ${currentRoutineTab!=='daily' ? `<button class="extra-btn" id="resetTabBtn" style="margin-top:12px;">🔄 RESETAR ${currentRoutineTab==='weekly'?'SEMANAIS':'MENSAIS'}</button>` : ''}
      <div class="extra-panel">
        <button class="extra-btn" id="extraBtn">➕ REGISTRO EXTRA</button>
        <div class="extra-list" id="extraList">
          <input class="extra-search" id="extraSearch" placeholder="Buscar atividade...">
          <div id="extraItems"></div>
        </div>
      </div>
    </div>`;

  panel.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => { playSound('click'); currentRoutineTab = tab.dataset.tab; renderRoutine(); };
  });

  const container = document.getElementById('routineItems');
  tasks.forEach((task, idx) => {
    const isDone = dataObj[idx] === true;
    const expText = Object.entries(task.exp||{}).map(([k,v])=>`${k}+${v}`).join(' ');
    const item = document.createElement('div');
    item.className = `routine-item${isDone?' done':''}`;
    item.innerHTML = `
      <input type="checkbox" class="toggle-sw" ${isDone?'checked':''} ${isDone?'disabled':''}>
      ${task.time ? `<span class="routine-time">${task.time}</span>` : ''}
      <span class="routine-text">${task.text}</span>
      <div class="routine-rewards">
        ${expText ? `<span class="routine-exp">✨${expText}</span>` : ''}
        ${task.coins > 0 ? `<span class="routine-coin">+${task.coins}🪙</span>` : ''}
      </div>`;
    if (!isDone) {
      const chk = item.querySelector('.toggle-sw');
      const applyTask = () => {
        if (chk.checked) {
          for (let [stat, val] of Object.entries(task.exp||{})) if (val > 0) addExp(stat, val);
          if (task.coins > 0) addCoins(task.coins);
          playSound('task');
          dataObj[idx] = true; saveRoutineData();
          item.classList.add('done');
          chk.disabled = true;
          addToLog(`✅ Rotina: ${task.text.replace(/[^\w\s\u00C0-\u024F]/g,'').trim()}`, '#3b82f6');
          renderRoutine();
        }
      };
      chk.onchange = applyTask;
      item.onclick = (e) => { if (e.target !== chk && !isDone) { chk.checked = !chk.checked; applyTask(); } };
    }
    container.appendChild(item);
  });

  const resetBtn = document.getElementById('resetTabBtn');
  if (resetBtn) {
    resetBtn.onclick = () => confirmModal(`Resetar todas as tarefas ${currentRoutineTab==='weekly'?'semanais':'mensais'}?`, () => {
      tasks.forEach((_,i) => { dataObj[i]=false; }); saveRoutineData(); renderRoutine();
    });
  }

  document.getElementById('extraBtn').onclick = () => {
    const list = document.getElementById('extraList');
    list.classList.toggle('open');
    renderExtraList('');
  };
  const es = document.getElementById('extraSearch');
  if (es) es.oninput = () => renderExtraList(es.value);
}

function renderExtraList(q) {
  const c = document.getElementById('extraItems'); if (!c) return;
  const filtered = extraActivities.filter(a => a.name.toLowerCase().includes(q.toLowerCase()));
  c.innerHTML = filtered.map(a => `<div class="extra-item" data-name="${a.name}"><span>${a.name}</span><span style="color:var(--gold2)">+${a.coins}🪙</span></div>`).join('');
  c.querySelectorAll('.extra-item').forEach(el => {
    el.onclick = () => {
      const act = extraActivities.find(a => a.name === el.dataset.name);
      if (act) { for (let [s,v] of Object.entries(act.exp)) addExp(s,v); addCoins(act.coins); showAchievement('📝 '+act.name, `+${act.coins} coins`); document.getElementById('extraList').classList.remove('open'); }
    };
  });
}
